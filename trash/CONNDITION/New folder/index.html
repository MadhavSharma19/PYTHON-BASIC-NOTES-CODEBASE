<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #111;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
        }

        header h1 {
            margin: 0;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .hero {
            height: 90vh;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .hero h2 {
            font-size: 3rem;
        }

        .section {
            padding: 60px 20px;
            text-align: center;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #f4f4f4;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>MySite</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Welcome to My Website</h2>
        <p>Build something amazing 🚀</p>
    </div>
</section>

<section class="section">
    <h2>Our Services</h2>
    <div class="cards">
        <div class="card">Web Development</div>
        <div class="card">App Development</div>
        <div class="card">AI Projects</div>
    </div>
</section>

<section class="section">
    <h2>Contact Us</h2>
    <p>Email: example@email.com</p>
</section>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
